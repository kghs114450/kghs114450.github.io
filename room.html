<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyNest 房間</title>
    <link rel="stylesheet" href="room.css">
</head>
<body>

<div class="container">

    <button class="back-btn" onclick="goHome()">
        ← 回首頁
    </button>

    <header class="room-header">

        <h1 id="roomTitle">房間名稱</h1>

        <div class="room-info">

            <span id="taskCount">
                0 個待辦
            </span>

            <span id="eventCount">
                0 個事件
            </span>

        </div>

    </header>

    <!-- 待辦 -->

    <section class="card">

        <h2>📋 待辦事項</h2>

        <div id="taskList"></div>

    </section>

    <!-- 事件 -->

    <section class="card">

        <h2>📅 事件</h2>

        <div id="eventList"></div>

    </section>

    <!-- 新增待辦 -->

    <section class="card add-card">

        <button
            class="add-toggle"
            onclick="toggleTaskForm()"
        >
            ＋ 新增待辦
        </button>

        <div
            id="taskForm"
            class="hidden"
        >

            <input
                type="text"
                id="taskInput"
                placeholder="輸入待辦事項"
            >

            <button onclick="addTask()">
                新增
            </button>

        </div>

    </section>

    <!-- 新增事件 -->

    <section class="card add-card">

        <button
            class="add-toggle"
            onclick="toggleEventForm()"
        >
            ＋ 新增事件
        </button>

        <div
            id="eventForm"
            class="hidden"
        >

            <input
                type="text"
                id="eventTitle"
                placeholder="事件名稱"
            >

            <input
                type="date"
                id="eventDate"
            >

            <button onclick="addEvent()">
                新增事件
            </button>

        </div>

    </section>

</div>

<script src="room.js"></script>

</body>
</html>
