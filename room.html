<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyNest 房間</title>
    <link rel="stylesheet" href="room.css">
</head>
<body>

<div class="container">

    <button class="back-btn" onclick="goHome()">
        ← 回首頁
    </button>

    <header class="room-header">

        <h1 id="roomTitle">房間名稱</h1>

        <div class="room-info">
            <span id="taskCount">0 個待辦</span>
            <span id="eventCount">0 個事件</span>
        </div>

    </header>

    <div class="main-grid">

        <!-- 待辦 -->

        <div class="panel">

            <h2>📋 待辦事項</h2>

            <div id="taskList"></div>

            <button
                class="add-btn"
                onclick="toggleTaskForm()"
            >
                ＋ 新增待辦
            </button>

            <div
                id="taskForm"
                class="hidden form-area"
            >

                <input
                    id="taskInput"
                    type="text"
                    placeholder="輸入待辦事項"
                >

                <button onclick="addTask()">
                    新增
                </button>

            </div>

        </div>

        <!-- 事件 -->

        <div class="panel">

            <h2>📅 事件</h2>

            <div id="eventList"></div>

            <button
                class="add-btn"
                onclick="toggleEventForm()"
            >
                ＋ 新增事件
            </button>

            <div
                id="eventForm"
                class="hidden form-area"
            >

                <input
                    id="eventTitle"
                    type="text"
                    placeholder="事件名稱"
                >

                <input
                    id="eventDate"
                    type="date"
                >

                <button onclick="addEvent()">
                    新增
                </button>

            </div>

        </div>

    </div>

</div>

<script src="room.js"></script>
</body>
</html>
