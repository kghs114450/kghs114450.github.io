<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyNest 房間</title>
    <link rel="stylesheet" href="room.css">
</head>
<body>

<div class="container">

    <header class="top-bar">
        <div>
            <h1 id="roomTitle">房間</h1>
            <p>StudyNest 學習空間</p>
        </div>

        <button class="home-btn" onclick="goHome()">
            ← 回首頁
        </button>
    </header>

    <div class="content">

        <!-- 待辦事項 -->
        <section class="card">
            <h2>📋 待辦事項</h2>

            <div class="input-row">
                <input
                    type="text"
                    id="taskInput"
                    placeholder="輸入待辦事項"
                >
                <button onclick="addTask()">新增</button>
            </div>

            <div id="taskList"></div>
        </section>

        <!-- 事件 -->
        <section class="card">
            <h2>📅 事件</h2>

            <div class="event-form">

                <input
                    type="text"
                    id="eventTitle"
                    placeholder="事件名稱"
                >

                <input
                    type="date"
                    id="eventDate"
                >

                <button onclick="addEvent()">
                    新增事件
                </button>

            </div>

            <div id="eventList"></div>

        </section>

    </div>

</div>

<script src="room.js"></script>

</body>
</html>
